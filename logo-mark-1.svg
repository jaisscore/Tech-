  </defs>
  <circle cx="20" cy="20" r="7" fill="none" stroke="url(#fsGold)" stroke-width="2"/>
  <ellipse cx="20" cy="20" rx="17" ry="6.2" fill="none" stroke="url(#fsGold)" stroke-width="1.4" opacity="0.85"/>
  <circle cx="36.2" cy="20" r="1.9" fill="#e8cf9c"/>
